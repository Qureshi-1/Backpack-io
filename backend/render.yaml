services:
  - type: web
    name: backport-backend
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: backport-data
      mountPath: /data
      sizeGB: 1
